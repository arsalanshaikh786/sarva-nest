<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f5f7ff;
padding:20px;
}

/* HEADER */

.header{
background:linear-gradient(135deg,#4f46e5,#7c3aed);
padding:25px;
border-radius:25px;
color:white;
margin-bottom:30px;
display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;
}

.header h1{
font-size:2rem;
}

/* STATS */

.stats{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-bottom:30px;
}

.stat-card{
background:white;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

.stat-card h3{
color:#4f46e5;
margin-bottom:10px;
}

.stat-card p{
font-size:2rem;
font-weight:700;
}

/* SECTION */

.section{
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:30px;
overflow:auto;
}

.section h2{
margin-bottom:25px;
color:#4f46e5;
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
}

th{
background:#4f46e5;
color:white;
padding:15px;
text-align:left;
}

td{
padding:15px;
border-bottom:1px solid #ddd;
font-size:14px;
}

button{
padding:10px 15px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:600;
}

.delete-btn{
background:red;
color:white;
}

.complete-btn{
background:green;
color:white;
}

/* MOBILE */

@media(max-width:768px){

.header{
text-align:center;
justify-content:center;
gap:15px;
}

table{
font-size:12px;
}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="header">

<h1>🛠 Admin Dashboard</h1>

<p>Manage Users & Orders</p>

</div>

<!-- STATS -->

<div class="stats">

<div class="stat-card">

<h3>Total Users</h3>

<p id="totalUsers">0</p>

</div>

<div class="stat-card">

<h3>Total Orders</h3>

<p id="totalOrders">0</p>

</div>

<div class="stat-card">

<h3>Pending Orders</h3>

<p id="pendingOrders">0</p>

</div>

</div>

<!-- USERS -->

<div class="section">

<h2>👤 Users</h2>

<table>

<thead>

<tr>

<th>Name</th>
<th>Email</th>
<th>Mobile</th>
<th>Address</th>
<th>Action</th>

</tr>

</thead>

<tbody id="usersTable">

</tbody>

</table>

</div>

<!-- ORDERS -->

<div class="section">

<h2>🛒 Orders</h2>

<table>

<thead>

<tr>

<th>Service</th>
<th>User</th>
<th>Price</th>
<th>Status</th>
<th>Action</th>

</tr>

</thead>

<tbody id="ordersTable">

</tbody>

</table>

</div>

<!-- FIREBASE -->

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getFirestore,
collection,
getDocs,
doc,
deleteDoc,
updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */

const firebaseConfig = {
apiKey: "AIzaSyBcXm5QQaYCCddVXNgGqTBAszdKEK-0PJQ",
authDomain: "multi-service-app-77dd8.firebaseapp.com",
projectId: "multi-service-app-77dd8",
storageBucket: "multi-service-app-77dd8.appspot.com",
messagingSenderId: "123732555482",
appId: "1:123732555482:web:ea47c825e0dbb504f597e3"
};

const app = initializeApp(firebaseConfig);

const db = getFirestore(app);

/* LOAD USERS */

async function loadUsers(){

const usersTable = document.getElementById("usersTable");

usersTable.innerHTML = "";

const querySnapshot = await getDocs(collection(db,"users"));

document.getElementById("totalUsers").innerText = querySnapshot.size;

querySnapshot.forEach((docu)=>{

const user = docu.data();

usersTable.innerHTML += `

<tr>

<td>${user.name || ""}</td>

<td>${user.email || ""}</td>

<td>${user.mobile || ""}</td>

<td>${user.address || ""}</td>

<td>

<button class="delete-btn"

onclick="deleteUser('${docu.id}')">

Delete

</button>

</td>

</tr>

`;

});

}

/* DELETE USER */

window.deleteUser = async(id)=>{

const confirmDelete = confirm("Delete this user?");

if(confirmDelete){

await deleteDoc(doc(db,"users",id));

loadUsers();

}

};

/* LOAD ORDERS */

async function loadOrders(){

const ordersTable = document.getElementById("ordersTable");

ordersTable.innerHTML = "";

const querySnapshot = await getDocs(collection(db,"orders"));

document.getElementById("totalOrders").innerText = querySnapshot.size;

let pending = 0;

querySnapshot.forEach((docu)=>{

const order = docu.data();

if(order.status !== "Completed"){
pending++;
}

ordersTable.innerHTML += `

<tr>

<td>${order.serviceName || ""}</td>

<td>${order.userName || ""}</td>

<td>₹${order.price || ""}</td>

<td>${order.status || "Pending"}</td>

<td>

<button class="complete-btn"

onclick="completeOrder('${docu.id}')">

Complete

</button>

</td>

</tr>

`;

});

document.getElementById("pendingOrders").innerText = pending;

}

/* COMPLETE ORDER */

window.completeOrder = async(id)=>{

await updateDoc(doc(db,"orders",id),{

status:"Completed"

});

loadOrders();

};

/* INITIAL LOAD */

loadUsers();

loadOrders();

</script>

</body>
</html>
