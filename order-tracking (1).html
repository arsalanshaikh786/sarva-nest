<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>My Orders</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#F4F5F9;--surface:#fff;--surface2:#F0F1F7;
  --text:#0F1117;--text2:#6B7280;--text3:#A0A8B5;
  --border:#E5E7EF;
  --purple:#6D28D9;--purple-bg:#EDE9FE;--purple-light:#F5F3FF;
  --green:#059669;--green-bg:#ECFDF5;
  --orange:#EA580C;--orange-bg:#FFF7ED;
  --blue:#1D4ED8;--blue-bg:#EFF6FF;
  --amber:#B45309;--amber-bg:#FFFBEB;
  --red:#DC2626;--red-bg:#FEF2F2;
  --r:14px;--rs:10px;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 4px 14px rgba(0,0,0,.05);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);max-width:430px;margin:0 auto;min-height:100vh}

/* topbar */
.topbar{background:var(--surface);padding:48px 18px 16px;position:sticky;top:0;z-index:20;border-bottom:1px solid var(--border)}
.brand{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.brand-icon{width:38px;height:38px;border-radius:11px;background:var(--purple);display:flex;align-items:center;justify-content:center}
.brand-icon svg{width:20px;height:20px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-title{font-size:17px;font-weight:700;letter-spacing:-.3px}
.brand-sub{font-size:11px;color:var(--text2);margin-top:1px}
.srow{display:flex;gap:8px}
.sinput{flex:1;display:flex;align-items:center;gap:8px;background:var(--surface2);border:1.5px solid transparent;border-radius:12px;padding:0 12px;height:44px;transition:border-color .2s}
.sinput:focus-within{border-color:var(--purple);background:#fff}
.sinput svg{width:15px;height:15px;stroke:var(--text3);stroke-width:2;fill:none;flex-shrink:0}
.sinput input{flex:1;border:none;background:transparent;font-size:13px;color:var(--text);font-family:inherit;outline:none}
.sinput input::placeholder{color:var(--text3)}
.sbtn{width:44px;height:44px;border-radius:12px;background:var(--purple);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sbtn svg{width:17px;height:17px;stroke:#fff;stroke-width:2.2;fill:none;stroke-linecap:round;stroke-linejoin:round}

/* chips / tabs */
.tabs-wrap{background:var(--surface);padding:10px 18px;border-bottom:1px solid var(--border);display:flex;gap:7px;overflow-x:auto;scrollbar-width:none}
.tabs-wrap::-webkit-scrollbar{display:none}
.chip{padding:7px 14px;border-radius:999px;font-size:12px;font-weight:500;border:1.5px solid var(--border);background:var(--surface);color:var(--text2);cursor:pointer;white-space:nowrap;transition:all .15s}
.chip.active{background:var(--purple);color:#fff;border-color:var(--purple)}

/* stats */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:14px 18px}
.sc{background:var(--surface);border-radius:var(--rs);padding:11px 6px;text-align:center;box-shadow:var(--shadow)}
.sc-n{font-size:19px;font-weight:700;letter-spacing:-.5px}
.sc-l{font-size:9px;color:var(--text2);margin-top:2px;text-transform:uppercase;letter-spacing:.4px}

/* list */
.olist{padding:0 18px 100px}

/* card */
.ocard{background:var(--surface);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:12px;overflow:hidden}
.ocard-head{padding:14px 14px 10px}
.ocard-top{display:flex;justify-content:space-between;align-items:flex-start}
.svc-row{display:flex;align-items:center;gap:9px}
.svc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.svc-icon svg{width:18px;height:18px;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;fill:none}
.svc-name{font-size:14px;font-weight:600;line-height:1.2}
.svc-id{font-size:11px;color:var(--text3);margin-top:1px}
.badge{font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px}
.b-pending{background:var(--amber-bg);color:var(--amber)}
.b-confirmed{background:var(--blue-bg);color:var(--blue)}
.b-processing{background:var(--purple-bg);color:var(--purple)}
.b-delivered{background:var(--green-bg);color:var(--green)}
.b-cancelled{background:var(--red-bg);color:var(--red)}
.b-default{background:var(--surface2);color:var(--text2)}
.meta-row{display:flex;flex-wrap:wrap;gap:9px;margin-top:9px}
.mc{display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)}
.mc svg{width:12px;height:12px;stroke:var(--text3);stroke-width:2;fill:none}

/* items section */
.ocard-items{padding:10px 14px;background:var(--bg);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.irow{display:flex;justify-content:space-between;align-items:center;padding:4px 0}
.irow-name{font-size:12px;color:var(--text)}
.irow-price{font-size:12px;color:var(--text2)}
.includes-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}
.inc-chip{font-size:10px;padding:3px 8px;background:var(--purple-bg);color:var(--purple);border-radius:6px}

/* timeline */
.timeline{padding:12px 14px;background:var(--bg);border-bottom:1px solid var(--border)}
.ttrack{display:flex;align-items:flex-start}
.tstep{flex:1;display:flex;flex-direction:column;align-items:center;position:relative}
.tline{position:absolute;top:9px;left:50%;right:-50%;height:2px;background:var(--border)}
.tline.done{background:var(--green)}
.tstep:last-child .tline{display:none}
.tdot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:#fff;z-index:1;display:flex;align-items:center;justify-content:center}
.tdot.done{background:var(--green);border-color:var(--green)}
.tdot.done::after{content:'';display:block;width:6px;height:6px;border-radius:50%;background:#fff}
.tlabel{font-size:9px;color:var(--text3);margin-top:5px;text-align:center;line-height:1.3}

/* footer */
.ocard-foot{padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.ocard-date{font-size:11px;color:var(--text3)}
.ocard-total{font-size:14px;font-weight:700}

/* empty / loader */
.empty{text-align:center;padding:55px 28px 40px}
.empty-icon{width:66px;height:66px;border-radius:18px;background:var(--purple-bg);margin:0 auto 14px;display:flex;align-items:center;justify-content:center}
.empty-icon svg{width:30px;height:30px;stroke:var(--purple);stroke-width:1.5;fill:none}
.empty-t{font-size:15px;font-weight:600;margin-bottom:6px}
.empty-s{font-size:12px;color:var(--text2);line-height:1.6}
.loader{text-align:center;padding:55px 20px;color:var(--text2);font-size:13px}
.spin{width:26px;height:26px;border:3px solid var(--border);border-top-color:var(--purple);border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 10px}
@keyframes sp{to{transform:rotate(360deg)}}
.err{margin:18px;background:var(--red-bg);border-radius:var(--r);padding:14px;font-size:12px;color:var(--red);line-height:1.6}
.hidden{display:none!important}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
    </div>
    <div>
      <div class="brand-title">My Orders</div>
      <div class="brand-sub">Food · Grocery · Veggies · Fixr</div>
    </div>
  </div>
  <div class="srow">
    <div class="sinput">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="emailInput" type="email" placeholder="Email daalo orders dekhne ke liye…" autocomplete="email"/>
    </div>
    <button class="sbtn" onclick="loadOrders()">
      <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </div>
</div>

<div class="tabs-wrap hidden" id="tabsRow">
  <button class="chip active" onclick="switchTab('all',this)">All</button>
  <button class="chip" onclick="switchTab('food_orders',this)">🍔 Food</button>
  <button class="chip" onclick="switchTab('grocery_orders',this)">🛒 Grocery</button>
  <button class="chip" onclick="switchTab('vegetable_orders',this)">🥦 Vegetables</button>
  <button class="chip" onclick="switchTab('fixr_bookings',this)">🔧 Fixr</button>
  <div id="extraTabs"></div>
</div>

<div class="stats hidden" id="statsRow">
  <div class="sc"><div class="sc-n" id="sAll">0</div><div class="sc-l">Total</div></div>
  <div class="sc"><div class="sc-n" id="sPend">0</div><div class="sc-l">Pending</div></div>
  <div class="sc"><div class="sc-n" id="sDone">0</div><div class="sc-l">Delivered</div></div>
  <div class="sc"><div class="sc-n" id="sAmt">₹0</div><div class="sc-l">Spent</div></div>
</div>

<div class="olist" id="orderList">
  <div class="empty">
    <div class="empty-icon">
      <svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
    </div>
    <div class="empty-t">Apne orders track karo</div>
    <div class="empty-s">Email daalo aur apne saare<br/>Food, Grocery, Veggies aur Fixr<br/>orders ek jagah dekho</div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
<script>
const FB={
  apiKey:"AIzaSyBcXm5QQaYCCddVXNgGqTBAszdKEK-0PJQ",
  authDomain:"multi-service-app-77dd8.firebaseapp.com",
  projectId:"multi-service-app-77dd8",
  storageBucket:"multi-service-app-77dd8.appspot.com",
  messagingSenderId:"123732555482",
  appId:"1:123732555482:web:ea47c825e0dbb504f597e3"
};
let app,db;
try{app=firebase.app('trk');}catch(e){app=firebase.initializeApp(FB,'trk');}
db=firebase.firestore(app);

// ── Service definitions (extendable) ─────────────
const SERVICES={
  food_orders:    {label:'Food',      emoji:'🍔', color:'#EA580C', bg:'#FFF7ED'},
  grocery_orders: {label:'Grocery',   emoji:'🛒', color:'#059669', bg:'#ECFDF5'},
  vegetable_orders:{label:'Veggies',  emoji:'🥦', color:'#16A34A', bg:'#F0FDF4'},
  fixr_bookings:  {label:'Fixr',      emoji:'🔧', color:'#6D28D9', bg:'#EDE9FE'},
};

// Extra services from admin_services collection
let extraServices={};

let allOrders=[], activeTab='all';
const $=id=>document.getElementById(id);

function tsMs(ts){
  if(!ts)return 0;
  if(ts.toMillis)return ts.toMillis();
  if(typeof ts==='number')return ts;
  return 0;
}
function fmtDate(ts){
  if(!ts)return '—';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'});
}
function fmtTime(ts){
  if(!ts)return '';
  const d=ts.toDate?ts.toDate():new Date(ts);
  return d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'});
}
function badgeClass(s){
  const m={pending:'b-pending',confirmed:'b-confirmed',processing:'b-processing',delivered:'b-delivered',cancelled:'b-cancelled'};
  return m[(s||'').toLowerCase()]||'b-default';
}

function buildTimeline(status){
  const steps=['Placed','Confirmed','Processing','Delivered'];
  const cur=(['pending','confirmed','processing','delivered']).indexOf((status||'').toLowerCase());
  return `<div class="timeline"><div class="ttrack">${steps.map((s,i)=>`
    <div class="tstep">
      <div class="tline ${i<cur?'done':''}"></div>
      <div class="tdot ${i<=cur?'done':''}"></div>
      <div class="tlabel">${s}</div>
    </div>`).join('')}</div></div>`;
}

function renderCard(o){
  const svc={...SERVICES,...extraServices}[o._col]||{label:o._col,emoji:'📦',color:'#6B7280',bg:'#F0F1F7'};
  const isFixr=o._col==='fixr_bookings';
  const status=(o.status||'pending').toLowerCase();
  const total=o.total||o.price||0;
  const fee=o.deliveryFee||0;

  // items
  let itemsHtml='';
  if(isFixr){
    itemsHtml=`<div class="ocard-items">
      <div class="irow"><span class="irow-name">${o.name||'Service'}</span><span class="irow-price">${o.duration||''}</span></div>
      ${(o.includes||[]).length?`<div class="includes-chips">${(o.includes||[]).map(x=>`<span class="inc-chip">${x}</span>`).join('')}</div>`:''}
    </div>`;
  } else if((o.cart||[]).length){
    itemsHtml=`<div class="ocard-items">${(o.cart||[]).map(i=>`
      <div class="irow">
        <span class="irow-name">${i.name||i.itemName||''}</span>
        <span class="irow-price">${i.qty||1} × ₹${i.price||0} = ₹${(i.qty||1)*(i.price||0)}</span>
      </div>`).join('')}</div>`;
  }

  // meta chips
  const chips=[];
  if(o.slot)chips.push(`<span class="mc"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${o.slot}</span>`);
  if(o.payment)chips.push(`<span class="mc"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>${(o.payment||'').toUpperCase()}</span>`);
  if(o.mobile)chips.push(`<span class="mc"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>${o.mobile}</span>`);
  if(o.address)chips.push(`<span class="mc"><svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>${String(o.address).slice(0,30)}…</span>`);

  const showTimeline=!isFixr&&status!=='cancelled';
  const orderId=o.orderId||o.id||'—';

  return `<div class="ocard">
    <div class="ocard-head">
      <div class="ocard-top">
        <div class="svc-row">
          <div class="svc-icon" style="background:${svc.bg}">
            <svg viewBox="0 0 24 24" style="stroke:${svc.color}">
              ${isFixr
                ?'<path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>'
                :'<path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/>'}
            </svg>
          </div>
          <div>
            <div class="svc-name">${svc.emoji} ${isFixr?(o.name||'Fixr Service'):(svc.label+' Order')}</div>
            <div class="svc-id">${orderId}</div>
          </div>
        </div>
        <span class="badge ${badgeClass(status)}">${status}</span>
      </div>
      ${chips.length?`<div class="meta-row">${chips.join('')}</div>`:''}
    </div>
    ${itemsHtml}
    ${showTimeline?buildTimeline(status):''}
    <div class="ocard-foot">
      <div class="ocard-date">${fmtDate(o.timestamp||o.bookingDate)} ${fmtTime(o.timestamp||o.bookingDate)}</div>
      <div class="ocard-total" style="color:${svc.color}">₹${total}${fee?`<span style="font-size:11px;font-weight:400;color:var(--text2)"> +₹${fee}</span>`:''}</div>
    </div>
  </div>`;
}

function renderList(orders){
  const el=$('orderList');
  if(!orders.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg></div><div class="empty-t">Koi orders nahi mili</div><div class="empty-s">Is category mein koi order nahi<br/>ya email match nahi hua</div></div>`;
    return;
  }
  el.innerHTML=orders.map(renderCard).join('');
}

function switchTab(tab,el){
  activeTab=tab;
  document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  renderList(tab==='all'?allOrders:allOrders.filter(o=>o._col===tab));
}

function updateStats(){
  $('sAll').textContent=allOrders.length;
  $('sPend').textContent=allOrders.filter(o=>o.status==='pending').length;
  $('sDone').textContent=allOrders.filter(o=>o.status==='delivered').length;
  const spent=allOrders.reduce((s,o)=>s+(parseInt(o.total||o.price||0)),0);
  $('sAmt').textContent='₹'+spent.toLocaleString('en-IN');
}

function buildExtraTabs(cols){
  const base=['food_orders','grocery_orders','vegetable_orders','fixr_bookings'];
  const extra=cols.filter(c=>!base.includes(c));
  const svcMap={...SERVICES,...extraServices};
  $('extraTabs').innerHTML=extra.map(c=>{
    const s=svcMap[c]||{label:c,emoji:'📦'};
    return `<button class="chip" onclick="switchTab('${c}',this)">${s.emoji} ${s.label}</button>`;
  }).join('');
}

async function loadOrders(){
  const email=$('emailInput').value.trim();
  if(!email){$('emailInput').focus();return;}
  $('orderList').innerHTML=`<div class="loader"><div class="spin"></div>Orders load ho rahi hain…</div>`;
  $('tabsRow').classList.add('hidden');
  $('statsRow').classList.add('hidden');
  allOrders=[];

  try{
    // load extra services from admin config
    try{
      const svSnap=await db.collection('admin_services').get();
      svSnap.forEach(doc=>{
        const d=doc.data();
        if(d.collectionName)extraServices[d.collectionName]={label:d.label||d.collectionName,emoji:d.emoji||'📦',color:d.color||'#6B7280',bg:d.bg||'#F0F1F7'};
      });
    }catch(e){}

    // all collections to query
    const allCols=[...Object.keys(SERVICES),...Object.keys(extraServices)];
    const uniqueCols=[...new Set(allCols)];

    const snaps=await Promise.all(uniqueCols.map(col=>
      db.collection(col).where('email','==',email).get().then(s=>({col,s})).catch(()=>null)
    ));

    snaps.forEach(res=>{
      if(!res)return;
      res.s.forEach(doc=>allOrders.push({...doc.data(),id:doc.id,_col:res.col}));
    });

    allOrders.sort((a,b)=>tsMs(b.timestamp||b.bookingDate)-tsMs(a.timestamp||a.bookingDate));

    const activeCols=[...new Set(allOrders.map(o=>o._col))];
    buildExtraTabs(activeCols);

    $('tabsRow').classList.remove('hidden');
    $('statsRow').classList.remove('hidden');
    updateStats();
    switchTab('all',document.querySelector('.chip'));
  }catch(err){
    $('orderList').innerHTML=`<div class="err"><strong>Error:</strong> ${err.message}<br/><span style="font-size:11px">Firebase Console → Firestore → Indexes check karo</span></div>`;
  }
}

$('emailInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadOrders();});
</script>
</body>
</html>
